server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

spring:
  application:
    name: one-server
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/one?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:one}
    password: ${DB_PASSWORD:one-local-password}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

one:
  security:
    token-secret: ${ONE_TOKEN_SECRET:local-development-secret-must-be-32-chars}
    token-ttl: ${ONE_TOKEN_TTL:PT168H}
  admin:
    username: ${ONE_ADMIN_USERNAME:one-admin}
    password: ${ONE_ADMIN_PASSWORD:local-admin-password}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    mock-enabled: ${WECHAT_MOCK_ENABLED:true}
  demo-data-enabled: ${ONE_DEMO_DATA_ENABLED:true}

logging:
  level:
    root: INFO
    com.one: INFO
