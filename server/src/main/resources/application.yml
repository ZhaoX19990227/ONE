server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

spring:
  application:
    name: one-server
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/one?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:one}
    password: ${DB_PASSWORD:one-local-password}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    deserialization.fail-on-unknown-properties: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints.web.exposure.include: health,info,metrics,prometheus
  endpoint.health.show-details: never
  metrics.tags.application: one-server

one:
  token-secret: ${ONE_TOKEN_SECRET:local-development-secret-must-be-32-chars}
  token-ttl: ${ONE_TOKEN_TTL:PT720H}
  wechat-mock-enabled: ${WECHAT_MOCK_ENABLED:true}
  demo-open-id: ${ONE_DEMO_OPEN_ID:one-demo-user}
  wechat-app-id: ${WECHAT_APP_ID:}
  wechat-app-secret: ${WECHAT_APP_SECRET:}
  admin-secret: ${ONE_ADMIN_SECRET:}
  qwen:
    enabled: ${QWEN_ENABLED:false}
    api-key: ${DASHSCOPE_API_KEY:}
    workspace-id: ${DASHSCOPE_WORKSPACE_ID:}
    base-url: ${QWEN_BASE_URL:}
    model: ${QWEN_VISION_MODEL:qwen3.6-flash}
    timeout: ${QWEN_TIMEOUT:PT30S}
  storage:
    type: ${ONE_STORAGE_TYPE:local}
    root: ${ONE_UPLOAD_ROOT:./data/uploads}
    public-base-url: ${ONE_MEDIA_BASE_URL:http://localhost:8080/api/media/public}
    max-image-bytes: ${ONE_MAX_IMAGE_BYTES:10485760}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      bucket: ${OSS_BUCKET:}
      access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
      access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
      key-prefix: ${OSS_KEY_PREFIX:one/media}
  content-safety:
    enabled: ${CONTENT_SAFETY_ENABLED:false}
    fail-closed: ${CONTENT_SAFETY_FAIL_CLOSED:true}
    endpoint: ${CONTENT_SAFETY_ENDPOINT:green-cip.cn-shanghai.aliyuncs.com}
    service: ${CONTENT_SAFETY_SERVICE:baselineCheck}
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
