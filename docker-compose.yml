services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [one-internal]

  server:
    build: ./server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      ONE_TOKEN_SECRET: ${ONE_TOKEN_SECRET}
      ONE_TOKEN_TTL: ${ONE_TOKEN_TTL:-PT720H}
      WECHAT_MOCK_ENABLED: ${WECHAT_MOCK_ENABLED:-false}
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      QWEN_ENABLED: ${QWEN_ENABLED:-true}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_WORKSPACE_ID: ${DASHSCOPE_WORKSPACE_ID}
      QWEN_VISION_MODEL: ${QWEN_VISION_MODEL:-qwen3.6-flash}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-}
      QWEN_TIMEOUT: ${QWEN_TIMEOUT:-PT30S}
      DEEPSEEK_ENABLED: ${DEEPSEEK_ENABLED:-false}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_TIMEOUT: ${DEEPSEEK_TIMEOUT:-PT6S}
      ONE_UPLOAD_ROOT: /data/uploads
      ONE_MEDIA_BASE_URL: ${ONE_MEDIA_BASE_URL}
      ONE_MAX_IMAGE_BYTES: ${ONE_MAX_IMAGE_BYTES:-10485760}
      ONE_STORAGE_TYPE: ${ONE_STORAGE_TYPE:-local}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_KEY_PREFIX: ${OSS_KEY_PREFIX:-one/media}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      CONTENT_SAFETY_ENABLED: ${CONTENT_SAFETY_ENABLED:-false}
      CONTENT_SAFETY_FAIL_CLOSED: ${CONTENT_SAFETY_FAIL_CLOSED:-true}
      CONTENT_SAFETY_ENDPOINT: ${CONTENT_SAFETY_ENDPOINT:-green-cip.cn-shanghai.aliyuncs.com}
      ONE_ADMIN_SECRET: ${ONE_ADMIN_SECRET:-}
    volumes:
      - media-data:/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/actuator/health | grep -q UP"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks: [one-internal]

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      ONE_DOMAIN: ${ONE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [server]
    networks: [one-internal]

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: [monitoring]
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports: ["127.0.0.1:9090:9090"]
    depends_on:
      server:
        condition: service_healthy
    networks: [one-internal]

networks:
  one-internal:

volumes:
  mysql-data:
  media-data:
  caddy-data:
  caddy-config:
  prometheus-data:
