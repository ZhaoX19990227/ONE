name: Cleanup merged branches
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.repository == 'ZhaoX19990227/ONE'
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/codex/food-memory-rebuild" --silent || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/codex/mvp-foundation" --silent || true
